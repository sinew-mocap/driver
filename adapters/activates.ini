; Per-kit set_anti_magnetic_strength (0x31) payloads (22 bytes = 44 hex chars).
; Bytes 0..17 are each node's magnetometer calibration; byte 18 is the strength
; level, written inverted as (14 - level). --mag replays these bytes and rewrites
; only byte 18, so it never clobbers calibration. Captured from the official
