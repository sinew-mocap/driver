name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DSINEW_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure --no-tests=ignore

  brace-lint:
    name: brace-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # prek installs clang-tidy via pip (additional_dependencies in .pre-commit-config.yaml);
      # no manual apt-get needed.  sinew_serial_host.c is excluded (needs mount_drift sibling)
      # and is covered instead by compilation in the test jobs.
      - uses: j178/prek-action@v2.0.4
